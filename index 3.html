<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 Gestor Financeiro Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f766e 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 1rem;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3.5rem);
            background: linear-gradient(135deg, #5eead4, #93c5fd, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: #7dd3c0;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .calendar-section {
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .month-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        button {
            background: #475569;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            font-weight: bold;
        }
        
        button:hover {
            background: #64748b;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .months-grid {
            display: grid;
            grid-template-columns: repeat(12, minmax(45px, 1fr));
            gap: 0.4rem;
            margin-bottom: 1.5rem;
        }
        
        .month-btn {
            padding: 0.4rem;
            font-size: 0.75rem;
        }
        
        .month-btn.active {
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
        }
        
        .years-grid {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .year-btn {
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
        }
        
        .year-btn.active {
            background: linear-gradient(135deg, #9333ea, #ec4899);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .card {
            padding: 1.5rem;
            border-radius: 1.5rem;
            color: white;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .card-content {
            position: relative;
            z-index: 1;
        }
        
        .card-renda { background: linear-gradient(135deg, #10b981, #14b8a6); }
        .card-gastos { background: linear-gradient(135deg, #ef4444, #ec4899); }
        .card-saldo { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
        .card-saldo.negativo { background: linear-gradient(135deg, #f97316, #ef4444); }
        
        .card h3 {
            font-size: 0.85rem;
            opacity: 0.95;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .card-subtitle {
            font-size: 0.85rem;
            opacity: 0.85;
        }
        
        .btn-adicionar-renda {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        
        .btn-adicionar-renda:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: white;
            transform: translateY(-2px);
        }
        
        /* MODAL PARA ADICIONAR RENDA */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }
        
        .modal.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: 2px solid #5eead4;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .modal-header h2 {
            color: #7dd3c0;
            font-size: 1.5rem;
        }
        
        .modal-close {
            background: none !important;
            color: #7dd3c0;
            font-size: 2rem;
            cursor: pointer;
            padding: 0 !important;
            width: auto !important;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 0.8rem;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #5eead4;
            box-shadow: 0 0 10px rgba(94, 234, 212, 0.2);
        }
        
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 1rem;
        }
        
        .modal-buttons .btn-cancel {
            background: #475569;
        }
        
        .modal-buttons .btn-submit {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            font-weight: bold;
        }
        
        .modal-buttons .btn-submit:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
        }
        
        /* ACCORDION */
        .accordion-section {
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: 2px solid #7dd3c0;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        
        .accordion-header {
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: none;
            color: #7dd3c0;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .accordion-header:hover {
            background: linear-gradient(135deg, #0f2942, #1e293b);
            transform: translateX(5px);
        }
        
        .accordion-header:active {
            transform: translateX(3px);
        }
        
        .accordion-content {
            padding: 1.5rem;
            border-top: 2px solid rgba(94, 234, 212, 0.2);
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 1000px;
            }
        }
        
        /* SEÇÃO DE CONTAS FIXAS */
        .fixed-accounts-section {
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: 2px solid #7dd3c0;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            overflow-x: hidden;
        }
        
        .fixed-accounts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .fixed-accounts-header h2 {
            color: #7dd3c0;
            font-size: 1.1rem;
        }
        
        .fixed-accounts-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
        }
        
        .fixed-account-card {
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 2px solid #7dd3c0;
            border-radius: 1rem;
            padding: 1rem;
            transition: all 0.3s;
            text-align: center;
        }
        
        .fixed-account-card.editing {
            border-color: #5eead4;
            background: linear-gradient(135deg, #1e293b, #0f2942);
        }
        
        .fixed-account-card:hover {
            border-color: #5eead4;
            box-shadow: 0 0 20px rgba(94, 234, 212, 0.3);
            transform: translateY(-3px);
        }
        
        .fixed-account-name {
            color: #7dd3c0;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .fixed-account-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.8rem;
        }
        
        .fixed-account-value.editing {
            display: none;
        }
        
        .renda-edit {
            display: none;
        }
        
        .fixed-account-card.editing .renda-edit {
            display: block;
        }
        
        .renda-edit input {
            width: 100%;
            padding: 0.5rem;
            background: #334155;
            border: 2px solid #7dd3c0;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        
        .renda-edit input:focus {
            outline: none;
            border-color: #5eead4;
        }
        
        .fixed-account-buttons {
            display: flex;
            gap: 0.3rem;
        }
        
        .fixed-account-buttons button {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.7rem;
        }
        
        .fixed-account-buttons .edit-btn {
            background: #7dd3c0;
            color: #0f172a;
        }
        
        .fixed-account-buttons .delete-btn {
            background: #ef4444;
        }
        
        .fixed-account-buttons .save-btn {
            background: #10b981;
            display: none;
        }
        
        .fixed-account-card.editing .edit-btn,
        .fixed-account-card.editing .delete-btn {
            display: none;
        }
        
        .fixed-account-card.editing .save-btn,
        .fixed-account-card.editing .cancel-btn {
            display: flex;
            flex: 1;
        }
        
        .fixed-account-buttons .cancel-btn {
            background: #475569;
            display: none;
        }
        
        /* GRÁFICO */
        .chart-section {
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .chart-section h3 {
            color: #7dd3c0;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .chart-container {
            position: relative;
            height: 280px;
        }
        
        @media (max-width: 640px) {
            .chart-container {
                height: 250px;
            }
        }
        
        /* SEÇÃO DE DESPESAS */
        .despesas-section {
            background: linear-gradient(135deg, #1e293b, #0f2942);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .despesas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .despesas-header h2 {
            color: #7dd3c0;
            font-size: 1.3rem;
        }
        
        .despesas-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #9333ea, #ec4899);
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: bold;
            grid-column: 1 / -1;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(147, 51, 234, 0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            table-layout: fixed;
        }
        
        th {
            text-align: left;
            padding: 0.8rem 0.5rem;
            border-bottom: 2px solid rgba(148, 163, 184, 0.2);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #7dd3c0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        td {
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.85rem;
        }
        
        tr:hover {
            background: rgba(94, 234, 212, 0.05);
        }
        
        @media (max-width: 640px) {
            th, td {
                padding: 0.6rem 0.3rem;
                font-size: 0.7rem;
            }
        }
        
        .message {
            position: fixed;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            background: #10b981;
            color: white;
            padding: 1rem;
            border-radius: 0.75rem;
            z-index: 999;
            max-width: 500px;
            animation: slideDown 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .message.erro {
            background: #ef4444;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
        
        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 1.5rem;
            }
            
            .despesas-form {
                grid-template-columns: 1fr;
            }
            
            .fixed-accounts-list {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .months-grid {
                grid-template-columns: repeat(6, minmax(45px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Gestor Financeiro Premium</h1>
        <p class="subtitle">Controle inteligente de suas finanças</p>

        <div id="message" class="message" style="display: none;"></div>

        <!-- CALENDÁRIO -->
        <div class="calendar-section">
            <div class="month-selector">
                <button onclick="mudarMes(-1)">&lt;</button>
                <div style="flex: 1; text-align: center;">
                    <p style="font-size: 0.8rem; color: #7dd3c0;">PERÍODO</p>
                    <h2 style="font-size: 1.8rem; margin: 0; color: white;"><span id="mesTitulo"></span> <span id="anoTitulo" style="color: #5eead4;"></span></h2>
                </div>
                <button onclick="mudarMes(1)">&gt;</button>
            </div>

            <div class="months-grid" id="monthsGrid"></div>

            <div style="text-align: center;">
                <label style="color: #7dd3c0; margin-bottom: 0.8rem; font-weight: bold; display: block;">Ano:</label>
                <div class="years-grid" id="yearsGrid"></div>
            </div>
        </div>

        <!-- CARDS RESUMO -->
        <div class="cards-grid">
            <div class="card card-renda">
                <div class="card-content">
                    <h3>💰 Renda Total</h3>
                    <div class="card-value" id="totalRenda">R$ 0,00</div>
                    <button class="btn-adicionar-renda" onclick="abrirModalRenda()">➕ Adicionar Renda</button>
                </div>
            </div>
            
            <div class="card card-gastos">
                <div class="card-content">
                    <h3>📊 Gastos</h3>
                    <div class="card-value" id="totalGastos">R$ 0,00</div>
                    <div class="card-subtitle" id="percentualGasto">0% do orçamento</div>
                </div>
            </div>
            
            <div class="card card-saldo" id="cardSaldo">
                <div class="card-content">
                    <h3>💳 Saldo</h3>
                    <div class="card-value" id="saldoRestante">R$ 0,00</div>
                    <div class="card-subtitle" id="statusSaldo">✓ Saudável</div>
                </div>
            </div>
        </div>

        <!-- SEÇÃO DE RENDAS ADICIONADAS (ACCORDION) -->
        <div class="accordion-section" id="rendasSection" style="display: none;">
            <button class="accordion-header" onclick="toggleRendas()">
                <span>💰 Rendas Adicionadas</span>
                <span id="rendasArrow" style="transition: transform 0.3s;">▼</span>
            </button>
            <div class="accordion-content" id="rendasContent" style="display: none;">
                <div class="fixed-accounts-list" id="rendasList"></div>
            </div>
        </div>

        <!-- SEÇÃO DE CONTAS FIXAS -->
        <div class="fixed-accounts-section" id="fixedAccountsSection" style="display: none;">
            <div class="fixed-accounts-header">
                <h2>📌 Contas Fixas do Mês</h2>
                <button onclick="abrirModalContaFixa()" style="background: linear-gradient(135deg, #10b981, #14b8a6); padding: 0.6rem 1.2rem; white-space: nowrap;">+ Fixa</button>
            </div>
            <div class="fixed-accounts-list" id="fixedAccountsList"></div>
        </div>

        <!-- GRÁFICO -->
        <div class="chart-section" id="chartSection" style="display: none;">
            <h3>📊 Gastos por Categoria</h3>
            <div class="chart-container">
                <canvas id="chartPie"></canvas>
            </div>
        </div>

        <!-- SEÇÃO DE DESPESAS -->
        <div class="despesas-section">
            <div class="despesas-header">
                <h2>➕ Adicionar Despesa</h2>
            </div>
            <form onsubmit="addDespesa(event)" class="despesas-form">
                <select id="categoria" required>
                    <option value="">Categoria</option>
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Saúde</option>
                    <option>Educação</option>
                    <option>Lazer</option>
                    <option>Moradia</option>
                    <option>Compras</option>
                    <option>Utilidades</option>
                </select>
                <input type="text" id="descricao" placeholder="Descrição (opcional)">
                <input type="text" id="valor" placeholder="Valor (R$)" required>
                <input type="date" id="data" required>
                <button type="submit" class="submit-btn">+ Registrar Despesa</button>
            </form>

            <!-- ACCORDION PARA TRANSAÇÕES -->
            <div class="accordion-section" id="transacoesSection" style="display: none; margin-top: 2rem;">
                <button class="accordion-header" onclick="toggleTransacoes()">
                    <span>📋 Transações do Mês</span>
                    <span id="transacoesArrow" style="transition: transform 0.3s;">▼</span>
                </button>
                <div class="accordion-content" id="transacoesContent" style="display: none;">
                    <div id="tabelaContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA ADICIONAR RENDA -->
    <div id="modalRenda" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💰 Adicionar Renda</h2>
                <button class="modal-close" onclick="fecharModalRenda()">×</button>
            </div>
            <form onsubmit="adicionarRenda(event)">
                <div class="form-group">
                    <label>Valor da Renda (R$)</label>
                    <input type="text" id="inputRenda" placeholder="Ex: 5000.00" inputmode="decimal" required autofocus>
                </div>
                <div class="form-group">
                    <label>Descrição (opcional)</label>
                    <input type="text" id="descricaoRenda" placeholder="Ex: Salário, Freelance...">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="fecharModalRenda()">Cancelar</button>
                    <button type="submit" class="btn-submit">✓ Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PARA CONTAS FIXAS -->
    <div id="modalContaFixa" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📌 Nova Conta Fixa</h2>
                <button class="modal-close" onclick="fecharModalContaFixa()">×</button>
            </div>
            <form onsubmit="adicionarContaFixa(event)">
                <div class="form-group">
                    <label>Nome da Conta</label>
                    <input type="text" id="nomeContaFixa" placeholder="Ex: Aluguel, Água..." required autofocus>
                </div>
                <div class="form-group">
                    <label>Valor Mensal (R$)</label>
                    <input type="text" id="valorContaFixa" placeholder="Ex: 1500.00" inputmode="decimal" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="fecharModalContaFixa()">Cancelar</button>
                    <button type="submit" class="btn-submit">✓ Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const mesesCompletos = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const cores = {'Alimentação':'#FF6B6B', 'Transporte':'#4ECDC4', 'Saúde':'#45B7D1', 'Educação':'#96CEB4', 'Lazer':'#FFEAA7', 'Moradia':'#DDA15E', 'Compras':'#BC6C25', 'Utilidades':'#9D84B7'};

        let mesSelecionado = new Date().getMonth();
        let anoSelecionado = new Date().getFullYear();
        let despesas = JSON.parse(localStorage.getItem('despesas_app') || '[]');
        let rendas = JSON.parse(localStorage.getItem('rendas_app') || '[]');
        let contasFixas = JSON.parse(localStorage.getItem('contasFixas_app') || '[]');
        let chartPie = null;

        function salvarDados() {
            localStorage.setItem('despesas_app', JSON.stringify(despesas));
            localStorage.setItem('rendas_app', JSON.stringify(rendas));
            localStorage.setItem('contasFixas_app', JSON.stringify(contasFixas));
        }

        function mostrarMensagem(texto, erro = false) {
            const div = document.getElementById('message');
            div.textContent = texto;
            div.className = 'message' + (erro ? ' erro' : '');
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }

        function abrirModalRenda() {
            document.getElementById('modalRenda').classList.add('active');
            document.getElementById('inputRenda').focus();
        }

        function fecharModalRenda() {
            document.getElementById('modalRenda').classList.remove('active');
            document.getElementById('inputRenda').value = '';
            document.getElementById('descricaoRenda').value = '';
        }

        function abrirModalContaFixa() {
            document.getElementById('modalContaFixa').classList.add('active');
            document.getElementById('nomeContaFixa').focus();
        }

        function fecharModalContaFixa() {
            document.getElementById('modalContaFixa').classList.remove('active');
            document.getElementById('nomeContaFixa').value = '';
            document.getElementById('valorContaFixa').value = '';
        }

        function adicionarRenda(e) {
            e.preventDefault();
            let valor = document.getElementById('inputRenda').value.trim().replace(',', '.');
            valor = parseFloat(valor);
            
            if(isNaN(valor) || valor <= 0) {
                mostrarMensagem('❌ Valor inválido!', true);
                return;
            }
            
            rendas.push({
                id: Date.now(),
                valor: valor,
                mes: mesSelecionado,
                ano: anoSelecionado,
                descricao: document.getElementById('descricaoRenda').value
            });
            
            salvarDados();
            mostrarMensagem('✅ Renda adicionada!');
            fecharModalRenda();
            atualizar();
        }

        function adicionarContaFixa(e) {
            e.preventDefault();
            let valor = document.getElementById('valorContaFixa').value.trim().replace(',', '.');
            valor = parseFloat(valor);
            
            if(isNaN(valor) || valor <= 0) {
                mostrarMensagem('❌ Valor inválido!', true);
                return;
            }
            
            contasFixas.push({
                id: Date.now(),
                nome: document.getElementById('nomeContaFixa').value,
                valor: valor
            });
            
            salvarDados();
            mostrarMensagem('✅ Conta fixa adicionada!');
            fecharModalContaFixa();
            atualizar();
        }

        function deletarContaFixa(id) {
            contasFixas = contasFixas.filter(c => c.id !== id);
            salvarDados();
            mostrarMensagem('✅ Conta fixa removida!');
            atualizar();
        }

        function editarRenda(id) {
            const card = document.querySelector(`[data-renda-id="${id}"]`);
            card.classList.add('editing');
            card.querySelector('.renda-edit input').focus();
        }

        function cancelarEdicaoRenda(id) {
            const card = document.querySelector(`[data-renda-id="${id}"]`);
            card.classList.remove('editing');
        }

        function salvarEdicaoRenda(id) {
            const card = document.querySelector(`[data-renda-id="${id}"]`);
            let novoValor = card.querySelector('.renda-edit input').value.trim().replace(',', '.');
            novoValor = parseFloat(novoValor);
            
            if(isNaN(novoValor) || novoValor <= 0) {
                mostrarMensagem('❌ Valor inválido!', true);
                return;
            }
            
            const renda = rendas.find(r => r.id === id);
            renda.valor = novoValor;
            salvarDados();
            mostrarMensagem('✅ Renda atualizada!');
            atualizar();
        }

        function deletarRenda(id) {
            rendas = rendas.filter(r => r.id !== id);
            salvarDados();
            mostrarMensagem('✅ Renda removida!');
            atualizar();
        }

        function toggleRendas() {
            const content = document.getElementById('rendasContent');
            const arrow = document.getElementById('rendasArrow');
            const isOpen = content.style.display === 'block';
            
            if(isOpen) {
                content.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'block';
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        function toggleTransacoes() {
            const content = document.getElementById('transacoesContent');
            const arrow = document.getElementById('transacoesArrow');
            const isOpen = content.style.display === 'block';
            
            if(isOpen) {
                content.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'block';
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        function mudarMes(direcao) {
            mesSelecionado += direcao;
            if(mesSelecionado < 0) {
                mesSelecionado = 11;
                anoSelecionado--;
            }
            if(mesSelecionado > 11) {
                mesSelecionado = 0;
                anoSelecionado++;
            }
            atualizar();
        }

        function atualizar() {
            document.getElementById('mesTitulo').textContent = mesesCompletos[mesSelecionado];
            document.getElementById('anoTitulo').textContent = anoSelecionado;

            let html = '';
            meses.forEach((m, i) => {
                html += `<button class="month-btn ${i === mesSelecionado ? 'active' : ''}" onclick="setMes(${i})">${m}</button>`;
            });
            document.getElementById('monthsGrid').innerHTML = html;

            html = '';
            for(let a = 2022; a <= 2030; a++) {
                html += `<button class="year-btn ${a === anoSelecionado ? 'active' : ''}" onclick="setAno(${a})">${a}</button>`;
            }
            document.getElementById('yearsGrid').innerHTML = html;

            const rendasDoMes = rendas.filter(r => r.mes === mesSelecionado && r.ano === anoSelecionado);
            const despesasDoMes = despesas.filter(d => {
                const data = new Date(d.data);
                return data.getMonth() === mesSelecionado && data.getFullYear() === anoSelecionado;
            });

            const totalRenda = rendasDoMes.reduce((s, r) => s + r.valor, 0) + contasFixas.reduce((s, c) => s + c.valor, 0);
            const totalGastos = despesasDoMes.reduce((s, d) => s + d.valor, 0);
            const saldo = totalRenda - totalGastos;

            document.getElementById('totalRenda').textContent = 'R$ ' + totalRenda.toFixed(2);
            document.getElementById('totalGastos').textContent = 'R$ ' + totalGastos.toFixed(2);
            document.getElementById('percentualGasto').textContent = totalRenda > 0 ? (totalGastos / totalRenda * 100).toFixed(1) + '% do orçamento' : '0% do orçamento';
            document.getElementById('saldoRestante').textContent = 'R$ ' + saldo.toFixed(2);
            document.getElementById('statusSaldo').textContent = saldo >= 0 ? '✓ Saudável' : '⚠ Acima do limite';
            document.getElementById('cardSaldo').className = 'card card-saldo' + (saldo < 0 ? ' negativo' : '');

            // Rendas adicionadas
            if(rendasDoMes.length === 0) {
                document.getElementById('rendasSection').style.display = 'none';
            } else {
                document.getElementById('rendasSection').style.display = 'block';
                document.getElementById('rendasContent').style.display = 'none';
                document.getElementById('rendasArrow').style.transform = 'rotate(0deg)';
                
                let html = '';
                rendasDoMes.forEach(r => {
                    html += `
                        <div class="fixed-account-card" data-renda-id="${r.id}">
                            <div class="fixed-account-value">R$ ${r.valor.toFixed(2)}</div>
                            
                            <div class="renda-edit">
                                <input type="text" placeholder="Novo valor" value="${r.valor.toFixed(2)}">
                            </div>
                            
                            <div class="fixed-account-buttons">
                                <button class="edit-btn" onclick="editarRenda(${r.id})">✏️ Editar</button>
                                <button class="delete-btn" onclick="deletarRenda(${r.id})">🗑️ Delete</button>
                                <button class="save-btn" onclick="salvarEdicaoRenda(${r.id})">Salvar</button>
                                <button class="cancel-btn" onclick="cancelarEdicaoRenda(${r.id})">Cancel</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('rendasList').innerHTML = html;
            }

            if(contasFixas.length === 0) {
                document.getElementById('fixedAccountsSection').style.display = 'none';
            } else {
                document.getElementById('fixedAccountsSection').style.display = 'block';
                let html = '';
                contasFixas.forEach(c => {
                    html += `<div class="fixed-account-card"><div class="fixed-account-name">${c.nome}</div><div class="fixed-account-value">R$ ${c.valor.toFixed(2)}</div><div class="fixed-account-buttons"><button onclick="deletarContaFixa(${c.id})">🗑️ Delete</button></div></div>`;
                });
                document.getElementById('fixedAccountsList').innerHTML = html;
            }

            // Gráfico
            if(totalRenda > 0) {
                document.getElementById('chartSection').style.display = 'block';
                atualizarGrafico(totalRenda, totalGastos);
            } else {
                document.getElementById('chartSection').style.display = 'none';
            }

            // Tabela
            if(despesasDoMes.length === 0) {
                document.getElementById('transacoesSection').style.display = 'none';
            } else {
                document.getElementById('transacoesSection').style.display = 'block';
                document.getElementById('transacoesContent').style.display = 'none';
                document.getElementById('transacoesArrow').style.transform = 'rotate(0deg)';
                
                let html = '<table><tr><th>Data</th><th>Cat</th><th>Desc</th><th>Valor</th><th style="width:40px;"></th></tr>';
                despesasDoMes.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(d => {
                    const cor = cores[d.categoria] || '#94a3b8';
                    const dataFormatada = new Date(d.data).toLocaleDateString('pt-BR', {month: '2-digit', day: '2-digit'});
                    const descricaoCurta = d.descricao ? d.descricao.substring(0, 15) : '-';
                    html += `<tr><td>${dataFormatada}</td><td><span style="background:${cor}30;color:${cor};padding:0.2rem 0.4rem;border-radius:0.25rem;font-size:0.7rem;font-weight:bold;">${d.categoria.slice(0,3)}</span></td><td>${descricaoCurta}</td><td style="text-align:right;">R$ ${d.valor.toFixed(2)}</td><td style="text-align:center;"><button onclick="delDespesa(${d.id})" style="padding:0.2rem 0.4rem;background:#ef4444;font-size:0.7rem;width:30px;">X</button></td></tr>`;
                });
                html += '</table>';
                document.getElementById('tabelaContainer').innerHTML = html;
            }
        }

        function atualizarGrafico(totalRenda, totalGastos) {
            const saldoRestante = Math.max(totalRenda - totalGastos, 0);
            
            // Calcular despesas por categoria
            const mesSelecionado_temp = mesSelecionado;
            const anoSelecionado_temp = anoSelecionado;
            const despesasDoMes = despesas.filter(d => {
                const data = new Date(d.data);
                return data.getMonth() === mesSelecionado_temp && data.getFullYear() === anoSelecionado_temp;
            });
            
            const despesasPorCategoria = {};
            despesasDoMes.forEach(d => {
                despesasPorCategoria[d.categoria] = (despesasPorCategoria[d.categoria] || 0) + d.valor;
            });
            
            const categorias = Object.keys(despesasPorCategoria).length > 0 ? Object.keys(despesasPorCategoria) : ['Sem dados'];
            const valores = categorias.map(c => despesasPorCategoria[c] || 0);
            
            // Adicionar Saldo ao gráfico
            const categoriasComSaldo = [...categorias, 'Saldo'];
            const valoresComSaldo = [...valores, saldoRestante];
            const cores_array = categorias.map(c => cores[c] || '#94a3b8');
            cores_array.push('#10b981'); // Verde para o saldo
            
            const ctxPie = document.getElementById('chartPie').getContext('2d');
            
            if(chartPie) chartPie.destroy();
            
            chartPie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: categoriasComSaldo,
                    datasets: [{
                        data: valoresComSaldo,
                        backgroundColor: cores_array,
                        borderColor: '#1e293b',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#cbd5e1',
                                font: { size: 12, weight: 'bold' },
                                padding: 15,
                                usePointStyle: true
                            }
                        }
                    }
                }
            });
        }

        function setMes(m) { mesSelecionado = m; atualizar(); }
        function setAno(a) { anoSelecionado = a; atualizar(); }

        function addDespesa(e) {
            e.preventDefault();
            const valor = parseFloat(document.getElementById('valor').value.replace(',', '.'));
            if(isNaN(valor) || valor <= 0) {
                mostrarMensagem('❌ Valor inválido', true);
                return;
            }
            
            despesas.push({
                id: Date.now(),
                categoria: document.getElementById('categoria').value,
                descricao: document.getElementById('descricao').value,
                valor: valor,
                data: document.getElementById('data').value
            });
            
            salvarDados();
            mostrarMensagem('✅ Despesa registrada!');
            document.getElementById('categoria').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            atualizar();
        }

        function delDespesa(id) {
            despesas = despesas.filter(d => d.id !== id);
            salvarDados();
            mostrarMensagem('✅ Despesa removida!');
            atualizar();
        }

        document.getElementById('data').valueAsDate = new Date();
        atualizar();
    </script>
</body>
</html>
